<div class="container">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title style="margin-bottom: 4px;">Adicionar Tarefa</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="adicionarTarefa()">

        <mat-form-field class="full-width" appearance="fill">
          <mat-label>Título</mat-label>
          <input matInput formControlName="titulo" placeholder="Digite o título da tarefa">
          @if (form.get('titulo')?.hasError('required')) {
            <mat-error>
              Título é obrigatório
            </mat-error>
          }
        </mat-form-field>

        <mat-form-field class="full-width" appearance="fill">
          <mat-label>Descrição</mat-label>
          <textarea matInput formControlName="descricao" placeholder="Digite a descrição da tarefa" rows="2"></textarea>
          @if (form.get('descricao')?.hasError('required')) {
            <mat-error>
              Descrição é obrigatória
            </mat-error>
          }
        </mat-form-field>

        <div class="button-group">
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            <mat-icon>add</mat-icon> Adicionar Tarefa
          </button>
          <button mat-stroked-button type="button" (click)="form.reset()">
            <mat-icon>clear</mat-icon> Limpar
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
